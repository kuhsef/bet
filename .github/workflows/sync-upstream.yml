name: Sync upstream

on:
  schedule:
    # 每天北京时间 04:00 自动同步
    - cron: "0 20 * * *"

  # 支持在 Actions 页面手动执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh repo sync "${{ github.repository }}" \
            --branch "${{ github.event.repository.default_branch }}"
